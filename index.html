<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    margin-bottom:10px;
}

.amount{
    font-size:30px;
    color:#009688;
    margin:20px 0;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    color:white;
}

.phonepe{
    background:#5f259f;
}

.paytm{
    background:#00baf2;
}

button:hover{
    opacity:.9;
}
</style>

</head>
<body>

<div class="container">

<h2>Demo Payment</h2>

<p>Pay Securely Using UPI</p>

<div class="amount">₹100</div>

<button class="phonepe" onclick="openPhonePe()">
Pay with PhonePe
</button>

<button class="paytm" onclick="openPaytm()">
Pay with Paytm
</button>

</div>

<script>

const upiId="9715459176@superyes";
const name="SuryaRaj";
const amount="100";
const note="Payment";

const upiUrl=`upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

function openPhonePe(){

window.location.href=`phonepe://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

setTimeout(function(){
window.location.href=upiUrl;
},1200);

}

function openPaytm(){

window.location.href=`paytmmp://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

setTimeout(function(){
window.location.href=upiUrl;
},1200);

}

</script>

</body>
</html>
