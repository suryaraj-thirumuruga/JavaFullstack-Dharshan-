<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- External css -->
     <link rel="stylesheet" href="./index.css">

    <!-- internal css -->
    <style>
        /* Element Selector*/
        body{
            background-color: lightcoral;
        }
        h1{
            background-color: green     ;
        }
        /* ID selector */
        #Name{
            text-align: center;
        }

        /* class Selector */
        .Name{
            text-decoration: underline;
            text-align: center;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 10px;
        }
        /* Universal */
        *{
            font-family: Arial, Helvetica, sans-serif
        }
        /* Grouping Selector */
        p,h1,li{
            background-color: yellow;
        }
    </style>

</head>
 <!-- inline Css -->
<body style="color: white;">       
    <h1 id="Name" style="font-family: 'Times New Roman', Times, serif;">Hello welcome to the developer world</h1  >
    <h1 class="Name">Hello welcome to the developer world</h1  >
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Reiciendis, similique!</p>
        <li>one</li>
        <li>one</li>
        <li>one</li>

        <form action="">
            <label for="">Name</label>
            <input type="text">
        </form>

    

</body>
</html>
